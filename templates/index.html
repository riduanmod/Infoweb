<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FF ProProfile - Advanced Player Lookup</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Deeper dark color palette, inspired by image_0.png */
            --bg-deep: #0a0b0f;
            --bg-card: #14161f;
            --primary-accent: #ffb800; /* Gold-orange */
            --secondary-accent: #37c8ff; /* Light blue */
            --text-main: #e6e9ef;
            --text-muted: #8b92a5;
            --border-deep: #222530;
            --copy-bg: #2a2e3b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
            line-height: 1.5;
        }

        /* --- Header Section --- */
        .app-header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 600px;
        }

        .app-title {
            color: var(--primary-accent);
            font-size: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.2rem;
            text-shadow: 0 0 10px rgba(255,184,0,0.3);
        }

        .app-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* --- Search Bar --- */
        .search-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            background-color: var(--bg-card);
            border: 1px solid var(--border-deep);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: border-color 0.3s ease;
        }

        .search-container:focus-within {
            border-color: var(--secondary-accent);
        }

        .search-container input {
            flex: 1;
            padding: 18px 25px;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        .search-container input::placeholder {
            color: var(--text-muted);
        }

        .search-container button {
            padding: 0 25px;
            border: none;
            background: linear-gradient(135deg, var(--secondary-accent), var(--primary-accent));
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .search-container button:active {
            opacity: 0.8;
        }

        /* --- Global Profile Area --- */
        .profile-wrapper {
            width: 100%;
            max-width: 800px;
            display: none;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* --- Card Styles --- */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-deep);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 12px 35px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        /* Helper for profile and leader cards */
        .primary-card {
            background: linear-gradient(135deg, rgba(20, 22, 31, 0.9), rgba(10, 11, 15, 0.9));
        }

        .card-header {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-deep);
            padding-bottom: 1rem;
        }

        /* --- Main Player Profile Card --- */
        .profile-overview {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2rem 1.5rem;
        }

        .avatar-container {
            position: relative;
            margin-bottom: 1rem;
        }

        .player-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid var(--border-deep);
            object-fit: cover;
            background-color: #000;
            padding: 3px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }

        .player-level-badge {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--bg-deep);
            border: 2px solid var(--primary-accent);
            color: var(--primary-accent);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.8rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .player-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.2rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .player-uid-region {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .copyable-field {
            display: flex;
            align-items: center;
            background-color: rgba(255,255,255,0.05);
            padding: 5px 10px;
            border-radius: 8px;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .copyable-field:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .copy-icon {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* A distinct layout for the profile likes */
        .likes-counter {
            background-color: rgba(255, 68, 114, 0.1); /* Pink/Red hue */
            border: 1px solid rgba(255, 68, 114, 0.3);
            border-radius: 12px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .likes-count {
            color: #ff4472;
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* --- Rank Information Card --- */
        .rank-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .rank-item {
            border: 1px solid var(--border-deep);
            border-radius: 14px;
            padding: 1rem;
            display: flex;
            align-items: center;
            background-color: rgba(255,255,255,0.01);
        }

        .rank-icon-placeholder {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary-accent);
            margin-right: 1rem;
            border: 1px solid var(--border-deep);
        }

        .rank-data {
            flex: 1;
        }

        .rank-mode {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 0.2rem;
        }

        .rank-points {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: -0.2rem;
        }

        .rank-max-name {
            font-size: 0.8rem;
            font-weight: 300;
            color: var(--text-muted);
            font-style: italic;
        }

        /* --- Detailed Grid Info --- */
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .highlight-value {
            color: var(--primary-accent);
            font-weight: 700;
        }

        /* Guild Card specific */
        .guild-name-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .guild-badge {
            background-color: var(--secondary-accent);
            color: #000;
            padding: 3px 10px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        /* --- Elite Pass & Weapon Icons --- */
        .icon-list-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .icon-list-item {
            width: 45px;
            height: 45px;
            background-color: #000;
            border-radius: 8px;
            border: 1px solid var(--border-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* --- Signature Card --- */
        .signature-card {
            border: 2px dashed var(--border-deep);
        }

        .signature-text {
            font-size: 0.95rem;
            color: #bbb;
            font-style: italic;
            background-color: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
            white-space: pre-wrap;
            margin-bottom: 1rem;
        }

        /* --- UI Feedback Elements --- */
        .ui-feedback {
            display: none;
            width: 100%;
            max-width: 600px;
            margin-bottom: 2rem;
            text-align: center;
        }

        .loader {
            border: 4px solid var(--bg-card);
            border-top: 4px solid var(--primary-accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-card {
            background-color: rgba(255, 68, 68, 0.08);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 12px;
            padding: 1rem;
            color: #ff4444;
            font-size: 0.95rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-title">FF ProProfile</div>
        <div class="app-subtitle">Advanced Free Fire Player & Guild Lookup</div>
    </div>

    <div class="search-container">
        <input type="number" id="uidInput" placeholder="Enter Player UID (numeric only)..." required>
        <button id="searchButton" onclick="fetchPlayerData()">Search</button>
    </div>

    <div class="ui-feedback" id="uiFeedback">
        <div class="loader" id="loader"></div>
        <div class="error-card" id="errorCard" style="display: none;"></div>
    </div>

    <div class="profile-wrapper" id="profileWrapper">

        <div class="card profile-overview primary-card">
            <div class="avatar-container">
                <img src="" alt="Player Avatar" class="player-avatar" id="player_avatar_img" onerror="this.onerror=null;this.src='https://i.ibb.co/C0V096T/icon-600.png';">
                <div class="player-level-badge">LV <span id="p_level"></span></div>
            </div>
            <div class="player-name highlight-value" id="p_name"></div>
            <div class="player-uid-region">
                <span class="copyable-field" onclick="copyUID()">
                    UID: <span id="p_uid"></span>
                    <span class="copy-icon">📋</span>
                </span>
                <span class="copyable-field">
                    🌐 <span id="p_region"></span>
                </span>
            </div>
            <div class="likes-counter">
                💖 <span class="likes-count" id="p_likes"></span>
            </div>
        </div>

        <div class="card">
            <div class="card-header">📊 Rank Stats</div>
            <div class="rank-grid">
                <div class="rank-item">
                    <div class="rank-icon-placeholder">BR</div>
                    <div class="rank-data">
                        <div class="rank-mode">Battle Royale</div>
                        <div class="rank-points" id="br_points"></div>
                        <div class="rank-max-name" id="br_max_name"></div>
                    </div>
                </div>
                <div class="rank-item">
                    <div class="rank-icon-placeholder">CS</div>
                    <div class="rank-data">
                        <div class="rank-mode">Clash Squad</div>
                        <div class="rank-points" id="cs_points"></div>
                        <div class="rank-max-name" id="cs_max_name"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" id="guildCardContainer">
            <div class="card-header">🛡️ Guild Details</div>
            <div class="guild-name-container">
                <div class="guild-badge">LV <span id="g_level"></span></div>
                <div class="player-name" id="g_name"></div>
            </div>
            <div class="detail-grid">
                <div class="detail-item">
                    <span class="detail-label">Members</span>
                    <span class="detail-value highlight-value" id="g_members"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Total EXP</span>
                    <span class="detail-value" id="g_exp_fmt"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Guild ID</span>
                    <span class="detail-value" id="g_id"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Owner UID</span>
                    <span class="copyable-field detail-value" onclick="copyValue('l_uid_copy')">
                        <span id="l_uid_copy"></span>
                        <span class="copy-icon">📋</span>
                    </span>
                </div>
            </div>
        </div>

        <div class="card guild-leader-card primary-card" id="guildLeaderContainer">
            <div class="card-header">👑 Guild Leader</div>
            <div class="detail-grid">
                <div class="detail-item">
                    <span class="detail-label">Name</span>
                    <span class="detail-value highlight-value" id="l_name"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Level</span>
                    <span class="detail-value" id="l_level"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">UID</span>
                    <span class="detail-value" id="l_uid"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Likes</span>
                    <span class="detail-value" id="l_likes"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Last Login</span>
                    <span class="detail-value" id="l_last_login"></span>
                </div>
            </div>
        </div>

        <div class="card" id="equippedItemsCard">
            <div class="card-header">⚔️ Equipped Items</div>
            <div class="detail-grid">
                <div class="detail-item">
                    <span class="detail-label">Outfit Items</span>
                    <div class="icon-list-grid" id="outfit_list_grid"></div>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Weapons</span>
                    <div class="icon-list-grid" id="weapon_list_grid"></div>
                </div>
            </div>
        </div>

        <div class="card" id="epHistoryCard">
            <div class="card-header">Diamonds💎 EP History</div>
            <div class="icon-list-grid" id="ep_list_grid"></div>
        </div>

        <div class="card signature-card" id="signatureCard">
            <div class="card-header">📝 Bio / Signature</div>
            <div class="signature-text" id="p_signature"></div>
            <button class="search-container input" style="border: none; background: rgba(255,184,0,0.1); color: var(--primary-accent); cursor: pointer; border-radius: 8px; font-weight: bold;" onclick="copySignature()">Copy Bio</button>
        </div>

    </div>

    <script>
        // API Base URL (adjust for local vs. production)
        const API_BASE = "";

        const els = {
            input: document.getElementById('uidInput'),
            loader: document.getElementById('loader'),
            error: document.getElementById('errorCard'),
            feedback: document.getElementById('uiFeedback'),
            wrapper: document.getElementById('profileWrapper')
        };

        // Populate dynamic avatar URL
        function setAvatar(avatarUrl) {
            const avatarImg = document.getElementById('player_avatar_img');
            if (!avatarUrl) {
                avatarImg.src = 'https://i.ibb.co/C0V096T/icon-600.png'; // Default if none
                return;
            }
            avatarImg.src = avatarUrl;
        }

        function populateListGrid(dataArray, gridId) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = ""; // Clear existing

            if (!dataArray || dataArray.length === 0) {
                grid.innerHTML = "<span style='color: var(--text-muted); font-style: italic;'>None Equipped</span>";
                return;
            }

            dataArray.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'icon-list-item';
                // Placeholder, maybe use an actual ID if possible in future
                itemDiv.innerText = item;
                grid.appendChild(itemDiv);
            });
        }

        function populateData(data) {
            const player = data["Player Information"] || {};
            const rank = data["Rank Information"] || {};
            const guild = data["Guild Information"] || {};
            const leader = data["Guild Leader Information"] || {};
            const extended = data["Extended Stats & Info"] || {};
            const items = data["Equipped Items"] || {};

            // Fallback checker
            const check = (val) => val != null ? val : 'N/A';

            // 1. Central Profile Overview
            setAvatar(player.Player_Avatar_URL);
            document.getElementById('p_level').innerText = check(player.Player_Level);
            document.getElementById('p_name').innerText = check(player.Player_Name);
            document.getElementById('p_uid').innerText = check(player.Player_UID);
            document.getElementById('p_region').innerText = check(player.Player_Region);
            document.getElementById('p_likes').innerText = check(player.Player_Likes);

            // 2. Rank Info
            document.getElementById('br_points').innerText = check(rank.BR_Points);
            document.getElementById('br_max_name').innerText = `Max: ${check(rank.BR_Max_Rank_Name)}`;
            document.getElementById('cs_points').innerText = check(rank.CS_Points);
            document.getElementById('cs_max_name').innerText = `Max: ${check(rank.CS_Max_Rank_Name)}`;

            // 3. Guild Info & 4. Guild Leader
            if (guild.Guild_ID) {
                document.getElementById('guildCardContainer').style.display = 'block';
                document.getElementById('guildLeaderContainer').style.display = 'block';
                document.getElementById('g_level').innerText = check(guild.Guild_Level);
                document.getElementById('g_name').innerText = check(guild.Guild_Name);
                document.getElementById('g_members').innerText = `${check(guild.Guild_Total_Members)} / ${check(guild.Guild_Capacity)}`;
                document.getElementById('g_exp_fmt').innerText = check(guild.Guild_EXP_Formatted);
                document.getElementById('g_id').innerText = check(guild.Guild_ID);
                document.getElementById('l_uid_copy').innerText = check(guild.Guild_Leader_UID);

                document.getElementById('l_name').innerText = check(leader.Guild_Leader_Name);
                document.getElementById('l_level').innerText = check(leader.Guild_Leader_Level);
                document.getElementById('l_uid').innerText = check(leader.Guild_Leader_UID);
                document.getElementById('l_likes').innerText = check(leader.Guild_Leader_Likes);
                document.getElementById('l_last_login').innerText = check(leader.Guild_Leader_Last_Login);
            } else {
                document.getElementById('guildCardContainer').style.display = 'none';
                document.getElementById('guildLeaderContainer').style.display = 'none';
            }

            // 5. Equipped Items (Weapons & Outfit)
            // Simplified lists for now
            populateListGrid(items.Player_Equipped_Outfit, 'outfit_list_grid');
            populateListGrid(items.Player_Equipped_Weapon, 'weapon_list_grid');

            // 6. EP History
            populateListGrid(extended.Player_History_EP_Stats, 'ep_list_grid');

            // 7. Signature / Bio
            document.getElementById('p_signature').innerText = check(player.Player_Signature);

        }

        async function fetchPlayerData() {
            const uid = els.input.value.trim();
            if (!uid) {
                showError("Please enter a valid Player UID.");
                return;
            }

            // Reset UI
            els.error.style.display = 'none';
            els.error.innerText = '';
            els.wrapper.style.display = 'none';
            els.loader.style.display = 'block';
            els.feedback.style.display = 'block';

            try {
                // Adjust the region if you need to, default is 'ME'
                const response = await fetch(`${API_BASE}/get?uid=${uid}&region=ME`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Failed to fetch data.");
                }

                // Populate data to HTML
                populateData(data);

                // Success UI State
                els.loader.style.display = 'none';
                els.wrapper.style.display = 'flex';

            } catch (error) {
                // Error UI State
                els.loader.style.display = 'none';
                els.wrapper.style.display = 'none';
                showError(error.message);
            }
        }

        function showError(msg) {
            els.feedback.style.display = 'block';
            els.error.style.display = 'block';
            els.error.innerText = `Error: ${msg}`;
        }

        // --- Copy to Clipboard Functions ---
        function copyUID() {
            const uid = document.getElementById('p_uid').innerText;
            if (uid && uid !== 'N/A') {
                navigator.clipboard.writeText(uid);
                showTooltip('UID Copied!');
            }
        }

        function copySignature() {
            const sig = document.getElementById('p_signature').innerText;
            if (sig && sig !== 'N/A') {
                navigator.clipboard.writeText(sig);
                showTooltip('Bio Copied!');
            }
        }

        function copyValue(elementId) {
            const val = document.getElementById(elementId).innerText;
            if (val && val !== 'N/A') {
                navigator.clipboard.writeText(val);
                showTooltip('Copied!');
            }
        }

        function showTooltip(msg) {
            // Simple visual feedback for copy
            const tooltip = document.createElement('div');
            tooltip.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background-color: var(--secondary-accent);
                color: #000;
                padding: 10px 20px;
                border-radius: 20px;
                font-size: 0.9rem;
                font-weight: bold;
                opacity: 0;
                transition: opacity 0.3s ease;
                z-index: 1000;
            `;
            tooltip.innerText = msg;
            document.body.appendChild(tooltip);
            // Trigger animation
            setTimeout(() => tooltip.style.opacity = '1', 10);
            setTimeout(() => {
                tooltip.style.opacity = '0';
                setTimeout(() => document.body.removeChild(tooltip), 300);
            }, 1500);
        }

        // Enter key listeners
        els.input.addEventListener('keypress', e => e.key === 'Enter' && fetchPlayerData());

    </script>
</body>
</html>
